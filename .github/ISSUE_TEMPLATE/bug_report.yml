name: Bug Report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps to reliably trigger the bug.
      placeholder: |
        1. Run `micasa demo`
        2. Navigate to Maintenance tab
        3. Press `a` to add a new record
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: micasa version
      description: Output of `micasa --version`.
      placeholder: "1.54.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, terminal recordings, or anything else that helps.
    validations:
      required: false
