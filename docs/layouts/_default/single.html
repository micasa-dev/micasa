{{ define "toc" }}
  {{ with .TableOfContents }}
    {{ if ne . "<nav id=\"TableOfContents\"></nav>" }}
      <nav class="toc" aria-label="Table of contents">
        <div class="toc-label">On this page</div>
        {{ . }}
      </nav>
    {{ end }}
  {{ end }}
{{ end }}

{{ define "main" }}
  <article data-pagefind-body>
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </article>
{{ end }}
