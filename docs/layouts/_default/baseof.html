<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} &middot; micasa</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ .Title }} &middot; micasa">
  <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ (or .Params.image "images/og-card.jpg") | absURL }}">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preload" as="font" type="font/woff2" href="{{ "fonts/source-serif-4-latin.woff2" | relURL }}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{{ "fonts/dm-serif-display-latin-400.woff2" | relURL }}" crossorigin>
  <link rel="stylesheet" href="{{ "css/fonts.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/variables.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/docs.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}">
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  <script type="importmap">
  {
    "imports": {
      "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11.12.2/dist/mermaid.esm.min.mjs"
    },
    "integrity": {
      "https://cdn.jsdelivr.net/npm/mermaid@11.12.2/dist/mermaid.esm.min.mjs": "sha384-bBdf+Hx1qc+N2a4poQjInyeO803gqSNqanHQiQ3DgvXaz/aeQz4mQLhIXpK9MP83"
    }
  }
  </script>
  <script src="{{ "js/theme.js" | relURL }}"></script>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<div class="docs-topbar">
  <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Toggle menu" aria-controls="docs-sidebar" aria-expanded="false">&#9776;</button>
  <a href="{{ site.Home.RelPermalink }}">micasa</a>
  <nav class="docs-topbar-nav" aria-label="Site">
    <a href="{{ "blog/" | relURL }}">Blog</a>
    {{ partial "github-link.html" (dict "class" "github-link") }}
  </nav>
</div>

<button id="search-hint" class="search-hint" type="button" aria-label="Open search" aria-controls="search-overlay" aria-expanded="false">
  <kbd>/</kbd> search
</button>

<div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Search documentation">
  <div class="search-modal" id="search-modal">
    <div id="search"></div>
  </div>
</div>

<div class="docs-layout">
  {{ partial "sidebar.html" . }}

  <main id="main" class="docs-main">
    {{ block "main" . }}{{ end }}

    {{ partial "pager.html" . }}
  </main>

  <aside class="toc-rail">
    {{ block "toc" . }}{{ end }}
  </aside>
</div>

<script src="{{ "js/menu-toggle.js" | relURL }}"></script>
<script src="/pagefind/pagefind-ui.js"></script>
<script src="{{ "js/search.js" | relURL }}"></script>
<script src="{{ "js/toc-scrollspy.js" | relURL }}"></script>
<script type="module" src="{{ "js/mermaid-init.js" | relURL }}"></script>

{{ partial "theme-toggle.html" . }}

</body>
</html>
