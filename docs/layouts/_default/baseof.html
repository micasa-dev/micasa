<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} &mdash; micasa</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preload" as="font" type="font/woff2" href="{{ "fonts/source-serif-4-latin.woff2" | relURL }}" crossorigin>
  <link rel="preload" as="font" type="font/woff2" href="{{ "fonts/dm-serif-display-latin-400.woff2" | relURL }}" crossorigin>
  <link rel="stylesheet" href="{{ "css/docs.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/syntax.css" | relURL }}">
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  <script type="importmap">
  {
    "imports": {
      "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11.12.2/dist/mermaid.esm.min.mjs"
    },
    "integrity": {
      "https://cdn.jsdelivr.net/npm/mermaid@11.12.2/dist/mermaid.esm.min.mjs": "sha384-bBdf+Hx1qc+N2a4poQjInyeO803gqSNqanHQiQ3DgvXaz/aeQz4mQLhIXpK9MP83"
    }
  }
  </script>
  <script src="{{ "js/theme.js" | relURL }}"></script>
</head>
<body>

<div class="docs-topbar">
  <button class="menu-toggle" onclick="document.querySelector('.docs-sidebar').classList.toggle('open')" aria-label="Toggle menu">&#9776;</button>
  <a href="{{ site.Home.RelPermalink }}">micasa</a>
  <nav class="docs-topbar-nav">
    <a href="{{ "blog/" | relURL }}">Blog</a>
    <a href="https://github.com/micasa-dev/micasa">GitHub</a>
  </nav>
</div>

<button class="search-hint" onclick="document.dispatchEvent(new KeyboardEvent('keydown',{key:'/'}))">
  <kbd>/</kbd> search
</button>

<div class="search-overlay" id="search-overlay">
  <div class="search-modal" id="search-modal">
    <div id="search"></div>
  </div>
</div>

<div class="docs-layout">
  {{ partial "sidebar.html" . }}

  <main class="docs-main">
    {{ block "main" . }}{{ end }}

    {{ partial "pager.html" . }}

    <div class="docs-footer">
      <a href="/">micasa.dev</a> &middot;
      <a href="{{ "blog/" | relURL }}">Blog</a> &middot;
      <a href="https://github.com/micasa-dev/micasa">GitHub</a> &middot;
      <a href="https://github.com/micasa-dev/micasa/blob/main/LICENSE">Apache-2.0</a>
    </div>
  </main>

  <aside class="toc-rail">
    {{ block "toc" . }}{{ end }}
  </aside>
</div>

<script>
// Close sidebar when clicking outside on mobile
document.addEventListener('click', function(e) {
  var sidebar = document.querySelector('.docs-sidebar');
  var toggle = document.querySelector('.menu-toggle');
  if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
    sidebar.classList.remove('open');
  }
});
</script>

<script src="/pagefind/pagefind-ui.js"></script>
<script>
(function() {
  var overlay = document.getElementById('search-overlay');
  var modal = document.getElementById('search-modal');
  var initialized = false;

  function open() {
    if (!initialized) {
      new PagefindUI({ element: '#search', showSubResults: true, showImages: false });
      initialized = true;
    }
    overlay.classList.remove('closing');
    overlay.classList.add('open');
    var el = document.querySelector('.pagefind-ui__search-input');
    if (el) el.focus();
  }

  function close() {
    overlay.classList.add('closing');
    modal.addEventListener('animationend', function handler() {
      modal.removeEventListener('animationend', handler);
      overlay.classList.remove('open', 'closing');
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && !overlay.classList.contains('open')) {
      var tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
      e.preventDefault();
      open();
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
      close();
    }
  });

  overlay.addEventListener('click', function(e) {
    if (!modal.contains(e.target)) close();
  });
})();
</script>

<script>
(function() {
  var toc = document.querySelector('.toc');
  if (!toc) return;
  var links = toc.querySelectorAll('a[href^="#"]');
  if (!links.length) return;

  var ids = [];
  links.forEach(function(a) { ids.push(a.getAttribute('href').slice(1)); });

  var visible = new Set();

  function highlight() {
    var active = null;
    for (var i = 0; i < ids.length; i++) {
      if (visible.has(ids[i])) { active = ids[i]; break; }
    }
    links.forEach(function(a) {
      a.classList.toggle('active', a.getAttribute('href') === '#' + active);
    });
  }

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        visible.add(entry.target.id);
      } else {
        visible.delete(entry.target.id);
      }
    });
    highlight();
  }, { rootMargin: '0px 0px -70% 0px', threshold: 0 });

  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) observer.observe(el);
  });

  links.forEach(function(a) {
    a.addEventListener('click', function() {
      var id = a.getAttribute('href').slice(1);
      visible.clear();
      visible.add(id);
      highlight();
    });
  });
})();
</script>

<script type="module">
import mermaid from "mermaid";

function getMermaidTheme() {
  var dark = document.documentElement.getAttribute("data-theme") === "dark";
  return {
    startOnLoad: false,
    theme: "base",
    themeVariables: dark ? {
      fontFamily: '"Source Serif 4", Georgia, serif',
      fontSize: "14px",
      background: "transparent",
      primaryColor: "#3d3730",
      primaryBorderColor: "#d4764e",
      primaryTextColor: "#e8ddd0",
      lineColor: "#706760",
      secondaryColor: "#242019",
      tertiaryColor: "#242019",
      actorBkg: "#3d3730",
      actorBorder: "#d4764e",
      actorTextColor: "#e8ddd0",
      actorLineColor: "#706760",
      signalColor: "#a89e91",
      signalTextColor: "#e8ddd0",
      labelBoxBkgColor: "#242019",
      labelBoxBorderColor: "#3d3730",
      labelTextColor: "#a89e91",
      loopTextColor: "#a89e91",
      noteBkgColor: "#302b25",
      noteBorderColor: "#3d3730",
      noteTextColor: "#e8ddd0",
      activationBkgColor: "#3d3730",
      activationBorderColor: "#d4764e"
    } : {
      fontFamily: '"Source Serif 4", Georgia, serif',
      fontSize: "14px",
      background: "transparent",
      primaryColor: "#f0ebe4",
      primaryBorderColor: "#c05e3c",
      primaryTextColor: "#2d2a26",
      lineColor: "#9e958a",
      secondaryColor: "#faf6f1",
      tertiaryColor: "#faf6f1",
      actorBkg: "#f0ebe4",
      actorBorder: "#c05e3c",
      actorTextColor: "#2d2a26",
      actorLineColor: "#d9d2c9",
      signalColor: "#4a4640",
      signalTextColor: "#2d2a26",
      labelBoxBkgColor: "#faf6f1",
      labelBoxBorderColor: "#d9d2c9",
      labelTextColor: "#4a4640",
      loopTextColor: "#4a4640",
      noteBkgColor: "#faf6f1",
      noteBorderColor: "#d9d2c9",
      noteTextColor: "#2d2a26",
      activationBkgColor: "#f0ebe4",
      activationBorderColor: "#c05e3c"
    }
  };
}

function processCodeInMermaid() {
  var dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.querySelectorAll(".mermaid svg").forEach(function(svg) {
    var walker = document.createTreeWalker(svg, NodeFilter.SHOW_TEXT, null);
    var nodes = [];
    var node;
    while ((node = walker.nextNode())) {
      if (node.textContent.includes("`")) {
        nodes.push(node);
      }
    }
    var mono = '"JetBrains Mono", "Fira Code", "Consolas", monospace';
    nodes.forEach(function(textNode) {
      var parts = textNode.textContent.split(/`([^`]+)`/g);
      if (parts.length <= 1) {
        return;
      }
      var parent = textNode.parentNode;
      var frag = document.createDocumentFragment();
      for (var i = 0; i < parts.length; i++) {
        if (parts[i] === "") {
          continue;
        }
        if (i % 2 === 0) {
          frag.appendChild(document.createTextNode(parts[i]));
        } else {
          var tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
          tspan.style.fontFamily = mono;
          tspan.textContent = parts[i];
          frag.appendChild(tspan);
        }
      }
      parent.replaceChild(frag, textNode);
    });

    // Adapt rect group backgrounds to current theme
    if (dark) {
      svg.querySelectorAll("rect").forEach(function(rect) {
        var fill = (rect.getAttribute("fill") || "").replace(/\s/g, "");
        if (fill === "rgb(240,235,228)") {
          rect.setAttribute("fill", "#302b25");
        }
      });
    }
  });
}

var renderQueued = false;
var renderActive = false;

async function renderMermaidDiagrams() {
  if (renderActive) {
    renderQueued = true;
    return;
  }
  renderActive = true;
  mermaid.initialize(getMermaidTheme());
  document.querySelectorAll(".mermaid").forEach(function(el) {
    var source = el.getAttribute("data-original-source");
    if (!source) {
      return;
    }
    var fresh = document.createElement("pre");
    fresh.className = "mermaid";
    fresh.setAttribute("data-original-source", source);
    fresh.textContent = source;
    el.parentNode.replaceChild(fresh, el);
  });
  await mermaid.run();
  processCodeInMermaid();
  renderActive = false;
  if (renderQueued) {
    renderQueued = false;
    renderMermaidDiagrams();
  }
}

await renderMermaidDiagrams();
document.addEventListener("theme-changed", renderMermaidDiagrams);
</script>

{{ partial "theme-toggle.html" . }}

</body>
</html>
