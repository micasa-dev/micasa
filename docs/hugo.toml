baseURL = "https://micasa.dev/"
title = "micasa"
languageCode = "en-us"
enableRobotsTXT = true

# Drop the site-wide RSS feed; only the blog section gets one (configured
# per-section in docs/content/blog/_index.md). The home RSS was pulling
# in every docs page (most without dates), giving subscribers a feed
# full of "Mon, 01 Jan 0001" entries.
[outputs]
home = ["HTML"]
section = ["HTML"]
taxonomy = ["HTML"]
term = ["HTML"]

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = "gruvbox"
noClasses = false

[markup.tableOfContents]
startLevel = 2
endLevel = 2
ordered = false

[params]
description = "A terminal UI for tracking everything about your home. Single SQLite file. No cloud. No account. No subscriptions."
