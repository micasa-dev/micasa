services:
  caddy:
    image: caddy@sha256:2acb10cebb92eea91a40b76691aff73adde9151416facbeab630bbc66d0969ab # 2-alpine
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      relay:
        condition: service_healthy

  relay:
    ports: []

volumes:
  caddy_data:
  caddy_config:
