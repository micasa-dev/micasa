version: 2

before:
  hooks:
    - go mod vendor

builds:
  - main: ./cmd/micasa
    binary: micasa
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "micasa_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

dockers_v2:
  - images:
      - "ghcr.io/micasa-dev/micasa"
    tags:
      - "{{ .Version }}"
      # Moving tags only advance when the workflow resolves MOVE_TAGS=true,
      # which happens iff the ref being built is the repository's current
      # latest release. For rebuilds of older tags MOVE_TAGS=false, each
      # line below collapses to {{ .Version }}, and goreleaser dedupes it
      # against the first tag.
      - '{{ if eq .Env.MOVE_TAGS "true" }}{{ .Major }}.{{ .Minor }}{{ else }}{{ .Version }}{{ end }}'
      - '{{ if eq .Env.MOVE_TAGS "true" }}{{ .Major }}{{ else }}{{ .Version }}{{ end }}'
      - '{{ if eq .Env.MOVE_TAGS "true" }}latest{{ else }}{{ .Version }}{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: false
    flags:
      - "--provenance=false"
    labels:
      "org.opencontainers.image.title": micasa
      "org.opencontainers.image.description": Terminal UI for managing home projects and maintenance
      "org.opencontainers.image.source": https://github.com/micasa-dev/micasa
      "org.opencontainers.image.url": https://micasa.dev
      "org.opencontainers.image.documentation": https://micasa.dev/docs/
      "org.opencontainers.image.licenses": Apache-2.0
      "org.opencontainers.image.version": "{{ .Version }}"
    annotations:
      "org.opencontainers.image.title": micasa
      "org.opencontainers.image.description": Terminal UI for managing home projects and maintenance
      "org.opencontainers.image.source": https://github.com/micasa-dev/micasa
      "org.opencontainers.image.url": https://micasa.dev
      "org.opencontainers.image.documentation": https://micasa.dev/docs/
      "org.opencontainers.image.licenses": Apache-2.0
      "org.opencontainers.image.version": "{{ .Version }}"

source:
  enabled: true
  prefix_template: "{{ .ProjectName }}-{{ .Version }}/"
  files:
    - vendor/**

release:
  mode: keep-existing
